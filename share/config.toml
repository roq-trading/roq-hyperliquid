# config template for the roq-hyperliquid gateway

symbols = [
  "^BTC$",
  "^ETH$",
  "^SOL$"
]

[accounts]

  [accounts.A1]
  master = true
  login = "YOUR_HYPERLIQUID_PUBLIC_ADDRESS_GOES_HERE"
  secret = "YOUR_HYPERLIQUID_PRIVATE_KEY_GOES_HERE"
  symbols = [ ".*" ]

[users]

  [users.test]
  password = "1234"
  symbols = ".*"

  [users.trader]
  password = "secret"
  accounts = [ "A1" ]
  symbols = [ ".*BTC.*", ".*ETH.*" ]

[rate_limits]

  [rate_limits.global]
    type = "ORDER_ACTION"
    aggregate = true
    request_limit = 100
    monitor_period = "10s"
    ban_period = "5m"
